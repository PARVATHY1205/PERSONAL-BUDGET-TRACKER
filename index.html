<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Personal Budget Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Personal Budget Tracker</h1>

        <!-- Income Section -->

        <div class="card">

            <h2>Monthly Income</h2>

            <input type="number" id="income" placeholder="Enter Your Income">

            <button onclick="saveIncome()">Save Income</button>

        </div>

        <!-- Expense Section -->

        <div class="card">

            <h2>Add Expense</h2>

            <input type="text" id="expenseName" placeholder="Expense Name">

            <input type="number" id="expenseAmount" placeholder="Expense Amount">

            <select id="category">

                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Bills</option>
                <option>Entertainment</option>
                <option>Other</option>

            </select>

            <button onclick="addExpense()">Add Expense</button>

        </div>



<!-- Monthly Comparison Graph Section -->

<div class="card">

    <h2>Monthly Income, Expense & Savings Comparison</h2>

    <canvas id="myChart"></canvas>

</div>

<!-- Chart JS Library -->

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    let chart;

    function updateChart(income, expense, balance) {

        let ctx = document.getElementById("myChart");

        // Remove old chart

        if (chart) {
            chart.destroy();
        }

        // Create New Chart

        chart = new Chart(ctx, {

            type: "bar",

            data: {

                labels: [
                    "Income",
                    "Expense",
                    "Savings"
                ],

                datasets: [{

                    label: "Monthly Financial Report",

                    data: [
                        income,
                        expense,
                        balance
                    ],

                    backgroundColor: [
                        "#16a34a",
                        "#dc2626",
                        "#2563eb"
                    ],

                    borderRadius: 10

                }]

            },

            options: {

                responsive: true,

                plugins: {

                    legend: {
                        display: false
                    }

                },

                scales: {

                    y: {

                        beginAtZero: true

                    }

                }

            }

        });


}</script>

        <!-- Summary Section -->

        <div class="summary">

            <div class="box income-box">
                <h3>Total Income</h3>
                <p id="totalIncome">₹0</p>
            </div>

            <div class="box expense-box">
                <h3>Total Expense</h3>
                <p id="totalExpense">₹0</p>
            </div>

            <div class="box balance-box">
                <h3>Balance</h3>
                <p id="balance">₹0</p>
            </div>

        </div>

        <!-- Saving Status -->

        <div class="card">

            <h2>Saving Status</h2>

            <div class="progress-bar">

                <div id="progress"></div>

            </div>

            <p id="savingText"></p>

        </div>

        <!-- Expense History -->

        <div class="card">

            <h2>Expense History</h2>

            <table>

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Delete</th>
                    </tr>

                </thead>

                <tbody id="expenseList">

                </tbody>

            </table>

        </div>

    </div>

    <script src="script.js"></script>


</script>

</body>

</html>
